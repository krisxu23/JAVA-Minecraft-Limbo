name: Build NanoLimbo and upload jar to Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew clean shadowJar

      - name: Prepare JAR
        id: prepare_jar
        run: |
          JAR_PATH=$(find build/libs -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" | head -n 1)
          cp "$JAR_PATH" ./server.jar
          echo "JAR_SIZE=$(ls -lh ./server.jar | awk '{print $5}')" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: server.jar

      - name: Cleanup build cache
        run: rm -rf .gradle build

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: server-jar

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.run_number }}"
          gh release create "$TAG" server.jar \
            --title "NanoLimbo Build #$TAG" \
            --notes "Automated build from commit ${{ github.sha }}" \
            --target "${{ github.sha }}" 2>/dev/null || \
          gh release upload "$TAG" server.jar --clobber

      - name: Cleanup old releases and workflow runs (keep latest 1)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete old releases (keep latest 1)
          tags=$(gh release list --limit 50 --json tagName --jq '.[].tagName | select(test("^\\d+$"))' | sort -n)
          count=$(echo "$tags" | wc -l)
          echo "Releases: $count"
          if [ "$count" -gt 1 ]; then
            keep=$((count - 1))
            echo "$tags" | head -n "$keep" | while read tag; do
              echo "Deleting release: $tag"
              gh release delete "$tag" --yes --cleanup-tag
            done
          fi

          # Delete old workflow runs across ALL workflows (keep latest 1)
          runs=$(gh run list --limit 50 --json databaseId --jq '.[].databaseId' | sort -n)
          count=$(echo "$runs" | wc -l)
          echo "Workflow runs: $count"
          if [ "$count" -gt 1 ]; then
            keep=$((count - 1))
            echo "$runs" | head -n "$keep" | while read id; do
              echo "Deleting run: $id"
              gh run delete "$id"
            done
          fi
